services:
  wiki:
    image: ghcr.io/perber/leafwiki:latest
    user: 1000:1000
    expose:
      - 8080
    environment:
      - LEAFWIKI_ALLOW_INSECURE=true
      - LEAFWIKI_JWT_SECRET=${LEAFWIKI_JWT_SECRET}
      - LEAFWIKI_ADMIN_PASSWORD=${LEAFWIKI_ADMIN_PASSWORD}
    volumes:
      - ${CONFIG_DIR}/leafwiki:/app/data
    networks:
      - cluster
    restart: unless-stopped

networks:
  cluster:
    external: true
