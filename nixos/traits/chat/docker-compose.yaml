services:
  chat-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - ${DATA_DIR}/synapse:/var/lib/postgresql/data
    networks:
      - matrix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-server:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    environment:
      SYNAPSE_SERVER_NAME: ${BASE_DOMAIN}
      SYNAPSE_REPORT_STATS: "no"
      POSTGRES_HOST: server-db
      POSTGRES_DB: synapse
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${CONFIG_DIR}/synapse:/data
    ports:
      - "8009:8008"  # HTTP listener
      - "8448:8448"  # Federation API
    networks:
      - matrix-network
    depends_on:
      auth-db:
        condition: service_healthy
    command: run

  auth:
    image: ghcr.io/element-hq/matrix-authentication-service:latest
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ${CONFIG_DIR}/mas:/config
    networks:
      - matrix-network
    depends_on:
      auth-db:
        condition: service_healthy
    command: ["server"]
    environment:
      - MAS_CONFIG=/config/config.yaml

  auth-db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth
    volumes:
      - ${DATA_DIR}/auth:/var/lib/postgresql
    networks:
      - matrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat:
    image: vectorim/element-web:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ${CONFIG_DIR}/element/config.json:/app/config.json
    networks:
      - matrix-network
    depends_on:
      - chat-server

networks:
  matrix-network:
    driver: bridge

