services:
  hole:
    image: pihole/pihole:${PIHOLE_VERSION:-latest}
    hostname: hole
    dns:
      - 9.9.9.9
    volumes:
      - ${DATA_DIR}:/etc/pihole
      - ${DNSMASQ_DIR}:/etc/dnsmasq.d
    environment:
      TZ: ${TIMEZONE}
      WEBPASSWORD: ${PASSWORD}
      FTLCONF_webserver_port: '8888o,[::]:8888o'
    network_mode: host
