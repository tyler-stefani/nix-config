services:
  db:
    container_name: redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    networks:
      - searxng
    volumes:
      - ${VALKEY_DATA_DIR}:/data
    deploy:
      placement:
        constraints:
          - node.hostname == bubblegum

  client:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    networks:
      - searxng
      - cluster
    expose:
      - 8080
    volumes:
      - ${CONFIG_DIR}:/etc/searxng:rw
      - ${DATA_DIR}:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://${SEARCH_HOSTNAME:-localhost}/
    deploy:
      placement:
        constraints:
          - node.hostname == bubblegum

networks:
  cluster:
    external: true
  searxng:
